name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docc:
    name: Build DocC
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Documentation
        run: xcodebuild docbuild -scheme IntentFlow -destination 'generic/platform=macOS'
