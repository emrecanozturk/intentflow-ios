name: Architecture Discussion
description: Propose a change to the architecture contract.
title: "[Architecture]: "
labels: ["architecture"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What architectural pressure are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the state/effect/UI/testing impact.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false
