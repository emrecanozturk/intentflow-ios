title: "[Adoption Story] "
labels: ["adoption"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying IntentFlow. Real adoption notes are the most useful feedback for improving the architecture, examples, generator, and docs.
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What app, module, or feature did you try IntentFlow with?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow Shape
      description: Describe the states, intents, events, effects, routes, and outputs you modeled.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What became clearer, what remained awkward, and what should improve?
    validations:
      required: true
  - type: textarea
    id: next
    attributes:
      label: Suggested Next Step
      description: Should this become documentation, an example, a generator improvement, or a runtime change?
    validations:
      required: false
