name: IntentFlowDemoApp
options:
  bundleIdPrefix: dev.intentflow
packages:
  IntentFlow:
    path: ../..
targets:
  IntentFlowDemoApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: IntentFlowDemoApp
      - path: ../SwiftUIExample/Sources
        group: Examples/SwiftUIExample
      - path: ../UIKitExample/Sources
        group: Examples/UIKitExample
      - path: ../Migration/MVVMToIntentFlow
        group: Examples/Migration/MVVMToIntentFlow
        excludes:
          - README.md
      - path: ../../Sources/IntentFlow/IntentFlow.docc/Tutorials/GettingStarted/LoginContract.swift
        group: Documentation/Tutorials
    dependencies:
      - package: IntentFlow
        product: IntentFlow
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.intentflow.demo
      INFOPLIST_FILE: IntentFlowDemoApp/Support/Info.plist
